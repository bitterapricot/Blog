name: Call Web API Daily

on:
  schedule:
    # 每天 UTC 时间 0:00 执行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      debug:
        description: 'Debug mode'
        required: false
        default: 'false'

jobs:
  call-api:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码（可选，如果不需要代码可省略）
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # 2. 调用 Web API
      - name: Call Web API
       # env:
        #  API_URL: ${{ secrets.API_URL }}
        #  API_KEY: ${{ secrets.API_KEY }}
        run: |
          # 使用 curl 调用 API
          response=$(curl -s -X GET \
            "https://bitterapricot-xtools.hf.space/" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}")
          #  -H "Authorization: Bearer $API_KEY" 
          
          echo "API Response:"
          echo "$response"

          response2=$(curl -s -X GET \
            "https://bitterapricot-node.hf.space/" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}")
          
          echo "API Response2:"
          echo "$response2"

          response3=$(curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=844347b4-a459-4529-8080-c00e9ca82d96' \
            -H 'Content-Type: application/json' \
            -d '{
            	"msgtype": "text",
            	"text": {
                	"content": "github call-apis：\n1. https://bitterapricot-xtools.hf.space/\n$response\n2. https://bitterapricot-node.hf.space/\n$response2"
            	}
              }')
          
          # 检查响应状态码
          if echo "$response" | grep -q "HTTP Status: 2[0-9][0-9]"; then
            echo "API call successful!"
          else
            echo "API call failed!"
            exit 1
          fi
